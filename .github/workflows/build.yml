name: Build Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create test ZIP
        run: |
          cd dist
          zip -r ../haevn-extension-test-build.zip .
          cd ..

      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: haevn-extension-test-build
          path: haevn-extension-test-build.zip
          retention-days: 1
