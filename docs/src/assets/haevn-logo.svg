<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Guardian Eye - Geometric, watchful -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#00CED1" stroke-width="2" opacity="0.3"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00CED1" stroke-width="2" opacity="0.5"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#00CED1" stroke-width="2" opacity="0.7"/>
  <!-- Central eye -->
  <ellipse cx="50" cy="50" rx="15" ry="25" fill="#00CED1" opacity="0.8"/>
  <ellipse cx="50" cy="50" rx="10" ry="18" fill="#1a2332"/>
  <circle cx="50" cy="50" r="5" fill="#00CED1"/>
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00CED1" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
